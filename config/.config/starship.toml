# @schema https://starship.rs/config-schema.json
add_newline = false
# Only "dark" is defined for now; add more palettes below and switch here later.
palette = "dark"

format = """
[â•­â”€](mauve)$os$shell$username$hostname$directory$git_branch$git_status$cmd_duration$fill\
$nodejs$python$php$rust$golang$time$line_break\
[â•°â”€](mauve)$character"""

# DARK MODE (Original Custom - Light Grey End)
[palettes.dark]
mauve = "#CBA6F7"
green_success = "#a3daa8"
red_error = "#ef5350"
text_light = "#E0DEF4"
surface_dark = "#444859"
overlay_grey = "#C6C3CE"
base_dark = "#1E1E2E"
red_root = "#F38BA8"
# High-Contrast Git Colors
git_red = "#B71C1C"
git_green = "#1B5E20"
git_orange = "#E65100"
git_teal = "#004D40"
git_blue = "#0D47A1"
git_purple = "#4A148C"

[character]
success_symbol = "[îٹ…îھ¶ ](green_success)"
error_symbol = "[îٹ…îھ¶ ](red_error)"
