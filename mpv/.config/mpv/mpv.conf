# Integration
input-ipc-server=/tmp/mpv-socket

# Playback
save-position-on-quit
force-window=yes
keep-open=yes
alang=en

# Network cache
cache-secs=60

# Video
profile=high-quality
vo=gpu-next
hwdec=auto
video-sync=display-resample

# OSD colors
background-color='#11111b'
osd-back-color='#6c7086'
osd-border-color='#11111b'
osd-color='#cdd6f4'
osd-shadow-color='#1e1e2e'

# Hyprland on the NVIDIA system needs source metadata for HDR passthrough.
# Other systems retain mpv's default target mode for display-aware mapping.
[nvidia-hdr]
profile-cond=io.open("/dev/nvidia0") ~= nil
target-colorspace-hint-mode=source
